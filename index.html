<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Make a Wish 🎂</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: #ffffff;
  font-family: Arial;
  overflow: hidden;
  color: #000;
}

/* SAFE LAYER SYSTEM */
.bg {
  position: absolute;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* TEXT ALWAYS TOP */
.header {
  position: relative;
  z-index: 10;
  text-align: center;
  margin-top: 30px;
}

h1 {
  font-size: 28px;
  margin: 0;
}

p {
  opacity: 0.6;
  font-size: 14px;
}

/* CENTER CAKE */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 5;
  text-align: center;
}

/* BIG CLEAN CAKE */
.cake {
  width: 360px;
  height: 230px;
  background: #000;
  border-radius: 25px;
  position: relative;
  margin: auto;
  box-shadow: 0 20px 50px rgba(0,0,0,0.15);
}

/* WHITE TOP */
.cake::before {
  content: "";
  position: absolute;
  top: -30px;
  left: 15px;
  right: 15px;
  height: 65px;
  background: #fff;
  border-radius: 50%;
  border: 1px solid #eee;
}

/* CANDLES */
.candle {
  width: 10px;
  height: 75px;
  background: #fff;
  position: absolute;
  top: -85px;
  border-radius: 5px;
}

.c1 { left: 90px; }
.c2 { left: 170px; }
.c3 { left: 250px; }

/* FLAME */
.flame {
  width: 12px;
  height: 12px;
  background: orange;
  border-radius: 50%;
  position: absolute;
  top: -15px;
  left: -1px;
  box-shadow: 0 0 15px orange;
}

/* BALLOONS */
.balloon {
  position: absolute;
  width: 18px;
  height: 26px;
  border-radius: 50%;
  bottom: -100px;
  animation: float 10s linear infinite;
  opacity: 0.6;
  z-index: 1;
}

@keyframes float {
  to { transform: translateY(-120vh); }
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- TEXT IS NOW GUARANTEED ABOVE EVERYTHING -->
<div class="header">
  <h1>🎉 Make a Wish 🎉</h1>
  <p>Blow into your mic to blow the candles 💨</p>
</div>

<!-- CAKE STAGE -->
<div class="center">
  <div class="cake">

    <div class="candle c1"><div class="flame"></div></div>
    <div class="candle c2"><div class="flame"></div></div>
    <div class="candle c3"><div class="flame"></div></div>

  </div>
</div>

<script>

let flames = document.querySelectorAll(".flame");

/* MIC BLOW */
navigator.mediaDevices.getUserMedia({ audio: true })
.then(stream => {
  const audioCtx = new AudioContext();
  const mic = audioCtx.createMediaStreamSource(stream);
  const analyser = audioCtx.createAnalyser();

  mic.connect(analyser);

  const data = new Uint8Array(analyser.frequencyBinCount);

  function detect() {
    analyser.getByteFrequencyData(data);

    let volume = data.reduce((a,b)=>a+b) / data.length;

    if (volume > 25) {
      flames.forEach(f => {
        f.style.opacity = "0";
      });
    }

    requestAnimationFrame(detect);
  }

  detect();
})
.catch(() => {
  alert("Allow microphone access to blow candles 🎤");
});

/* BALLOONS */
for (let i = 0; i < 18; i++) {
  let b = document.createElement("div");
  b.className = "balloon";
  b.style.left = Math.random() * 100 + "%";
  b.style.background = ["#000","#444","#888"][i % 3];
  b.style.animationDuration = (6 + Math.random() * 6) + "s";
  document.body.appendChild(b);
}

</script>

</body>
</html>
