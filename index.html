<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Make a Wish 🎂</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: #000;
  font-family: Arial;
  color: white;
  overflow: hidden;
}

/* CENTER EVERYTHING */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

/* TITLE */
h1 {
  font-size: 30px;
  margin-bottom: 10px;
}

p {
  opacity: 0.6;
  font-size: 14px;
}

/* BIG CENTER CAKE */
.cake {
  width: 360px;
  height: 230px;
  background: #111;
  border-radius: 25px;
  margin: 30px auto;
  position: relative;
  box-shadow: 0 25px 80px rgba(255,255,255,0.08);
}

/* WHITE FROSTING */
.cake::before {
  content: "";
  position: absolute;
  top: -30px;
  left: 15px;
  right: 15px;
  height: 65px;
  background: white;
  border-radius: 50%;
}

/* CANDLES */
.candle {
  width: 10px;
  height: 75px;
  background: white;
  position: absolute;
  top: -85px;
  border-radius: 5px;
}

.c1 { left: 90px; }
.c2 { left: 170px; }
.c3 { left: 250px; }

/* FLAMES */
.flame {
  width: 12px;
  height: 12px;
  background: orange;
  border-radius: 50%;
  position: absolute;
  top: -15px;
  left: -1px;
  box-shadow: 0 0 18px orange;
}

/* BALLOONS */
.balloon {
  position: absolute;
  width: 20px;
  height: 28px;
  border-radius: 50%;
  bottom: -100px;
  animation: float 9s linear infinite;
  opacity: 0.7;
}

@keyframes float {
  to {
    transform: translateY(-120vh);
  }
}
</style>
</head>

<body>

<div class="center">

  <h1>🎉 Make a Wish 🎉</h1>
  <p>Blow into your mic to blow out the candles 💨</p>

  <div class="cake">
    <div class="candle c1"><div class="flame"></div></div>
    <div class="candle c2"><div class="flame"></div></div>
    <div class="candle c3"><div class="flame"></div></div>
  </div>

</div>

<script>

let flames = document.querySelectorAll(".flame");

/* MIC BLOW (ONLY WAY) */
navigator.mediaDevices.getUserMedia({ audio: true })
.then(stream => {
  const audioCtx = new AudioContext();
  const mic = audioCtx.createMediaStreamSource(stream);
  const analyser = audioCtx.createAnalyser();

  mic.connect(analyser);

  const data = new Uint8Array(analyser.frequencyBinCount);

  function detect() {
    analyser.getByteFrequencyData(data);

    let volume = data.reduce((a,b)=>a+b) / data.length;

    // blow threshold
    if (volume > 25) {
      flames.forEach(f => {
        f.style.opacity = "0";
        f.style.transform = "scale(0)";
      });
    }

    requestAnimationFrame(detect);
  }

  detect();
})
.catch(() => {
  alert("Please allow microphone access to blow the candles 🎤");
});

/* BALLOONS */
for (let i = 0; i < 18; i++) {
  let b = document.createElement("div");
  b.className = "balloon";
  b.style.left = Math.random() * 100 + "%";
  b.style.background = ["#fff","#aaa","#666"][i % 3];
  b.style.animationDuration = (6 + Math.random() * 6) + "s";
  document.body.appendChild(b);
}

</script>

</body>
</html>
