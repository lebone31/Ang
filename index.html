<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Make a Wish 🎂</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: radial-gradient(circle at top, #111, #000);
  overflow: hidden;
  font-family: Arial;
  color: white;
}

/* CENTER EVERYTHING */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

/* TITLE */
h1 {
  font-size: 28px;
  margin-bottom: 10px;
}

/* CAKE (BIG + CENTERED) */
.cake {
  width: 320px;
  height: 200px;
  background: #000;
  border-radius: 25px;
  position: relative;
  margin: auto;
  box-shadow: 0 30px 80px rgba(255,255,255,0.08);
}

/* WHITE FROSTING */
.cake::before {
  content: "";
  position: absolute;
  top: -30px;
  left: 15px;
  right: 15px;
  height: 60px;
  background: #fff;
  border-radius: 50%;
}

/* CANDLES */
.candle {
  width: 10px;
  height: 70px;
  background: #fff;
  position: absolute;
  top: -80px;
  border-radius: 5px;
}

.c1 { left: 80px; }
.c2 { left: 150px; }
.c3 { left: 220px; }

/* FLAME */
.flame {
  width: 12px;
  height: 12px;
  background: orange;
  border-radius: 50%;
  position: absolute;
  top: -15px;
  left: -1px;
  box-shadow: 0 0 20px orange;
}

/* BALLOONS */
.balloon {
  position: absolute;
  width: 20px;
  height: 28px;
  border-radius: 50%;
  bottom: -100px;
  animation: float 8s linear infinite;
  opacity: 0.7;
}

@keyframes float {
  to { transform: translateY(-120vh); }
}

/* hint */
p {
  opacity: 0.7;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="center">

  <h1>🎉 Make a Wish 🎉</h1>
  <p>Click the cake OR blow into mic 💨</p>

  <div class="cake" onclick="blowCandles()">

    <div class="candle c1"><div class="flame"></div></div>
    <div class="candle c2"><div class="flame"></div></div>
    <div class="candle c3"><div class="flame"></div></div>

  </div>

</div>

<script>

let flames = document.querySelectorAll(".flame");

/* BALLOONS */
for (let i = 0; i < 18; i++) {
  let b = document.createElement("div");
  b.className = "balloon";
  b.style.left = Math.random() * 100 + "%";
  b.style.background = ["#fff","#ccc","#999","#000"][i % 4];
  b.style.animationDuration = (5 + Math.random() * 6) + "s";
  document.body.appendChild(b);
}

/* CLICK BLOW */
function blowCandles() {
  flames.forEach(f => f.style.opacity = "0");
}

/* MIC BLOW */
navigator.mediaDevices.getUserMedia({ audio: true })
.then(stream => {
  const audioCtx = new AudioContext();
  const mic = audioCtx.createMediaStreamSource(stream);
  const analyser = audioCtx.createAnalyser();

  mic.connect(analyser);
  const data = new Uint8Array(analyser.frequencyBinCount);

  function detect() {
    analyser.getByteFrequencyData(data);
    let volume = data.reduce((a,b)=>a+b) / data.length;

    if (volume > 25) {
      flames.forEach(f => f.style.opacity = "0");
    }

    requestAnimationFrame(detect);
  }

  detect();
})
.catch(() => {
  console.log("Mic blocked");
});

</script>

</body>
</html>
