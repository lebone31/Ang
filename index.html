<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Make a Wish 🎂</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: #000;
  color: white;
  font-family: Arial;
  overflow: hidden;
}

/* CENTER */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

/* TITLE */
h1 {
  font-size: 30px;
  margin-bottom: 10px;
  font-weight: 500;
}

p {
  opacity: 0.7;
  font-size: 14px;
}

/* CAKE */
.cake {
  width: 340px;
  height: 210px;
  background: #111;
  border-radius: 25px;
  margin: 30px auto;
  position: relative;
  box-shadow: 0 20px 60px rgba(255,255,255,0.08);
}

/* frosting */
.cake::before {
  content: "";
  position: absolute;
  top: -30px;
  left: 15px;
  right: 15px;
  height: 60px;
  background: white;
  border-radius: 50%;
}

/* candles */
.candle {
  width: 10px;
  height: 70px;
  background: white;
  position: absolute;
  top: -80px;
}

.c1 { left: 80px; }
.c2 { left: 160px; }
.c3 { left: 240px; }

/* flame */
.flame {
  width: 12px;
  height: 12px;
  background: orange;
  border-radius: 50%;
  position: absolute;
  top: -15px;
  left: -1px;
  box-shadow: 0 0 15px orange;
  transition: 0.3s;
}

/* BALLOONS */
.balloon {
  position: absolute;
  width: 20px;
  height: 28px;
  border-radius: 50%;
  bottom: -100px;
  animation: float 10s linear infinite;
  opacity: 0.7;
}

@keyframes float {
  to {
    transform: translateY(-120vh);
  }
}
</style>
</head>

<body>

<div class="center">

<h1>🎉 Make a Wish 🎉</h1>
<p>Click the cake or blow into mic</p>

<div class="cake" onclick="blowCandles()">
  <div class="candle c1"><div class="flame"></div></div>
  <div class="candle c2"><div class="flame"></div></div>
  <div class="candle c3"><div class="flame"></div></div>
</div>

</div>

<script>

let flames = document.querySelectorAll(".flame");

/* CLICK BLOW */
function blowCandles() {
  flames.forEach(f => f.style.opacity = "0");
}

/* MIC BLOW */
navigator.mediaDevices.getUserMedia({ audio: true })
.then(stream => {
  const audioCtx = new AudioContext();
  const mic = audioCtx.createMediaStreamSource(stream);
  const analyser = audioCtx.createAnalyser();

  mic.connect(analyser);
  const data = new Uint8Array(analyser.frequencyBinCount);

  function detect() {
    analyser.getByteFrequencyData(data);
    let volume = data.reduce((a,b)=>a+b) / data.length;

    if (volume > 25) {
      flames.forEach(f => f.style.opacity = "0");
    }

    requestAnimationFrame(detect);
  }

  detect();
});

/* BALLOONS */
for (let i = 0; i < 15; i++) {
  let b = document.createElement("div");
  b.className = "balloon";
  b.style.left = Math.random() * 100 + "%";
  b.style.background = ["#fff","#aaa","#666"][i % 3];
  b.style.animationDuration = (6 + Math.random() * 6) + "s";
  document.body.appendChild(b);
}

</script>

</body>
</html>
